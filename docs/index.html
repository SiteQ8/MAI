<!DOCTYPE html>
<html lang="ar" dir="rtl" id="root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0ea5e9">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>MAI | ماي — Kuwait Water Delivery</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%2338bdf8'/%3E%3Cstop offset='100%25' stop-color='%230369a1'/%3E%3C/linearGradient%3E%3Ccircle cx='60' cy='60' r='56' fill='url(%23g)'/%3E%3Cpath d='M60 22C60 22 38 48 38 65C38 78 48 88 60 88C72 88 82 78 82 65C82 48 60 22 60 22Z' fill='white' opacity='.9'/%3E%3Ctext x='60' y='64' text-anchor='middle' font-size='22' font-weight='900' fill='%230369a1'%3EMAI%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--sky:#0ea5e9;--sky2:#0284c7;--sky3:#e0f2fe;--green:#059669;--red:#ef4444;--amber:#f59e0b;--purple:#8b5cf6;
--bg:#f8fafc;--card:#fff;--border:#f1f5f9;--sh:0 1px 3px rgba(0,0,0,.04);
--tx:#0f172a;--t2:#475569;--t3:#94a3b8;--t4:#cbd5e1;
--r:14px;--nav:58px;--max:430px}
html{font-size:16px}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;max-width:var(--max);margin:0 auto;overflow-x:hidden;position:relative}
[dir="ltr"] body{font-family:'Inter','Tajawal',sans-serif}

/* PAGE SYSTEM */
.page{display:none;padding-bottom:calc(var(--nav) + 12px);min-height:100vh}
.page.on{display:block}

/* NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:var(--max);background:#fff;border-top:1px solid var(--border);display:flex;height:var(--nav);padding-bottom:env(safe-area-inset-bottom);z-index:100}
.bnav-i{flex:1;text-align:center;padding:6px 0;cursor:pointer}
.bnav-i .ico{font-size:1.3rem;display:block;transition:transform .1s}
.bnav-i.on .ico{transform:scale(1.1)}
.bnav-i .lbl{font-size:.58rem;display:block;margin-top:1px;color:var(--t3);font-weight:500}
.bnav-i.on .lbl{color:var(--sky);font-weight:700}

/* HERO */
.hero{background:linear-gradient(135deg,#0ea5e9,#0284c7);padding:20px 16px 24px;color:#fff}
.hero-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.hero-greet{font-size:.78rem;opacity:.8}
.hero-name{font-size:1.25rem;font-weight:900}
.hero-actions{display:flex;gap:8px}
.hero-btn{background:rgba(255,255,255,.15);border:none;border-radius:8px;padding:6px 10px;color:#fff;font-size:.68rem;cursor:pointer;font-family:inherit;font-weight:600;backdrop-filter:blur(4px)}
.hero-cart{position:relative}
.cart-badge{position:absolute;top:-5px;right:-5px;background:var(--red);color:#fff;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:.52rem;font-weight:700}
[dir="ltr"] .cart-badge{right:auto;left:-5px}
.search{width:100%;padding:11px 16px 11px 40px;border-radius:12px;border:none;background:rgba(255,255,255,.18);color:#fff;font-size:.85rem;outline:none;font-family:inherit;backdrop-filter:blur(8px)}
[dir="ltr"] .search{padding:11px 40px 11px 16px}
.search::placeholder{color:rgba(255,255,255,.55)}
.search-wrap{position:relative;margin-bottom:12px}
.search-ico{position:absolute;top:50%;transform:translateY(-50%);left:14px;font-size:1rem}
[dir="ltr"] .search-ico{left:auto;right:14px}
.hero-stats{display:flex;gap:10px}
.hero-stat{flex:1;background:rgba(255,255,255,.12);border-radius:10px;padding:10px 12px;backdrop-filter:blur(4px)}
.hero-stat-lbl{font-size:.6rem;opacity:.7}
.hero-stat-val{font-size:1.1rem;font-weight:900;margin-top:2px}

/* SECTION */
.sec{padding:14px 16px 0}
.sec-t{font-size:1rem;font-weight:800;margin-bottom:10px}

/* CATEGORIES */
.cats{display:flex;gap:8px;overflow-x:auto;padding:0 16px 6px;-webkit-overflow-scrolling:touch}
.cats::-webkit-scrollbar{display:none}
.cat{flex:0 0 auto;width:68px;text-align:center;cursor:pointer}
.cat-ico{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin:0 auto 4px}
.cat-lbl{font-size:.58rem;font-weight:600;color:var(--t2)}

/* PROMO BANNERS */
.promos{display:flex;gap:10px;overflow-x:auto;padding:0 16px 6px;-webkit-overflow-scrolling:touch}
.promos::-webkit-scrollbar{display:none}
.promo{flex:0 0 auto;width:250px;border-radius:16px;padding:16px;color:#fff;cursor:pointer}
.promo-ico{font-size:1.6rem;margin-bottom:6px}
.promo-t{font-size:.88rem;font-weight:800}
.promo-s{font-size:.68rem;opacity:.8;margin-top:4px}

/* CARDS */
.card{background:var(--card);border-radius:var(--r);padding:14px;margin:0 16px 8px;box-shadow:var(--sh);display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .08s;border:1px solid var(--border)}
.card:active{transform:scale(.98)}
.card-logo{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-name{font-size:.88rem;font-weight:700}
.card-meta{font-size:.65rem;color:var(--t3);margin-top:2px}
.card-arrow{color:var(--t4);font-size:1rem}

/* PRODUCT CARD */
.prod{background:var(--card);border-radius:var(--r);padding:14px;margin:0 16px 8px;box-shadow:var(--sh);display:flex;align-items:center;gap:12px;border:1px solid var(--border)}
.prod-img{font-size:1.8rem;width:44px;text-align:center;flex-shrink:0}
.prod-info{flex:1;min-width:0}
.prod-name{font-size:.82rem;font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.prod-desc{font-size:.62rem;color:var(--t3);margin-top:2px}
.prod-price{display:flex;align-items:center;gap:6px;margin-top:4px}
.prod-now{font-size:.95rem;font-weight:800;color:var(--sky)}
.prod-old{font-size:.72rem;color:var(--t3);text-decoration:line-through}
.badge{font-size:.5rem;padding:2px 7px;border-radius:4px;font-weight:700}
.badge-offer{background:#fef2f2;color:#dc2626}
.badge-new{background:#ecfdf5;color:#059669}
.badge-best{background:#eff6ff;color:#2563eb}
.prod-add{width:36px;height:36px;border-radius:10px;background:var(--sky);border:none;color:#fff;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.prod-add:active{transform:scale(.9)}

/* COMPANY HERO */
.comp-hero{padding:20px 16px;color:#fff;position:relative}
.comp-hero-top{display:flex;align-items:center;gap:14px;margin-top:10px}
.comp-hero-logo{font-size:2.6rem}
.comp-hero-name{font-size:1.3rem;font-weight:900}
.comp-hero-desc{font-size:.72rem;opacity:.85;margin-top:2px;line-height:1.5}
.comp-stats{display:flex;gap:16px;margin-top:12px;font-size:.72rem;opacity:.9}
.comp-back{background:rgba(255,255,255,.15);border:none;border-radius:8px;padding:6px 12px;color:#fff;font-size:.78rem;cursor:pointer;font-family:inherit;font-weight:600}

/* INFO CARDS */
.info-scroll{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.info-scroll::-webkit-scrollbar{display:none}
.info-card{flex:0 0 auto;background:var(--card);border-radius:12px;padding:10px 14px;box-shadow:var(--sh);display:flex;align-items:center;gap:8px;border:1px solid var(--border)}
.info-card-ico{font-size:1.1rem}
.info-card-lbl{font-size:.55rem;color:var(--t3)}
.info-card-val{font-size:.72rem;font-weight:700;direction:ltr}
[dir="rtl"] .info-card-val{direction:ltr;text-align:right}

/* CERTS */
.certs{display:flex;gap:5px;padding:4px 16px 10px;flex-wrap:wrap}
.cert{font-size:.55rem;padding:3px 10px;border-radius:20px;background:#ecfdf5;color:#059669;font-weight:600;border:1px solid #d1fae5}

/* FILTER TABS */
.ftabs{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.ftabs::-webkit-scrollbar{display:none}
.ftab{padding:6px 14px;border-radius:20px;background:var(--card);border:1px solid var(--border);font-size:.68rem;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;color:var(--t2)}
.ftab.on{background:var(--sky);color:#fff;border-color:var(--sky)}

/* WATER TIP */
.tip{margin:0 16px 10px;background:linear-gradient(135deg,#ecfdf5,#f0f9ff);border-radius:16px;padding:14px;display:flex;align-items:center;gap:10px}
.tip-ico{font-size:1.8rem;flex-shrink:0}
.tip-txt{font-size:.78rem;font-weight:600;line-height:1.6}
.tip-lbl{font-size:.55rem;color:var(--t3);margin-top:3px}

/* DELIVERY AREAS */
.areas{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:0 16px 10px}
.area{background:var(--card);border-radius:12px;padding:10px;text-align:center;box-shadow:var(--sh);border:1px solid var(--border)}
.area-name{font-size:.78rem;font-weight:700}
.area-time{font-size:.65rem;color:var(--sky);font-weight:600;margin-top:2px}

/* STATS BAR */
.stats-bar{margin:0 16px 14px;background:linear-gradient(135deg,#1e293b,#334155);border-radius:14px;padding:16px;display:flex;justify-content:space-around;text-align:center;color:#fff}
.stat-val{font-size:1.25rem;font-weight:900}
.stat-lbl{font-size:.52rem;opacity:.5;margin-top:2px}
.stat-sep{width:1px;background:rgba(255,255,255,.12)}

/* CHECKOUT / CART */
.sheet{position:fixed;inset:0;background:#fff;z-index:200;overflow-y:auto;max-width:var(--max);margin:0 auto}
.sheet-hdr{display:flex;align-items:center;gap:10px;padding:16px;position:sticky;top:0;background:#fff;z-index:5;border-bottom:1px solid var(--border)}
.sheet-back{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--tx)}
.sheet-title{font-size:1.15rem;font-weight:800}
.cart-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border)}
.cart-item-img{font-size:1.6rem}
.cart-item-info{flex:1}
.cart-item-name{font-size:.82rem;font-weight:700}
.cart-item-company{font-size:.62rem;color:var(--t3)}
.cart-item-price{font-size:.88rem;font-weight:800;color:var(--sky);margin-top:2px}
.qty-ctrl{display:flex;align-items:center;gap:8px}
.qty-btn{width:28px;height:28px;border-radius:8px;border:none;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qty-minus{background:#f1f5f9;color:var(--tx)}
.qty-plus{background:var(--sky3);color:var(--sky)}
.qty-val{font-weight:700;min-width:20px;text-align:center;font-size:.88rem}
.cart-rm{background:none;border:none;color:var(--red);font-size:1rem;cursor:pointer;padding:4px}

/* PAY METHOD */
.pay-opt{display:flex;align-items:center;gap:10px;padding:12px;border-radius:10px;margin:0 16px 6px;cursor:pointer;border:2px solid var(--border);background:var(--card)}
.pay-opt.on{border-color:var(--sky);background:#f0f9ff}
.pay-ico{font-size:1.3rem}
.pay-name{font-size:.85rem;font-weight:600;flex:1}
.pay-radio{width:18px;height:18px;border-radius:50%;border:2px solid var(--t4);display:flex;align-items:center;justify-content:center}
.pay-opt.on .pay-radio{border-color:var(--sky)}
.pay-dot{width:10px;height:10px;border-radius:50%;background:var(--sky)}

/* SUMMARY */
.summary{background:var(--card);border-radius:var(--r);padding:16px;margin:12px 16px;border:1px solid var(--border)}
.sum-row{display:flex;justify-content:space-between;padding:6px 0;font-size:.82rem}
.sum-total{font-size:1.05rem;font-weight:900;padding-top:10px;margin-top:6px;border-top:2px solid var(--border)}
.sum-free{color:var(--green);font-weight:600}
.sum-disc{color:var(--green)}

/* CTA */
.cta{padding:12px 16px;position:sticky;bottom:0;background:#fff;border-top:1px solid var(--border)}
.cta-btn{width:100%;padding:15px;border-radius:14px;border:none;color:#fff;font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit}
.cta-sky{background:linear-gradient(135deg,#0ea5e9,#3b82f6);box-shadow:0 4px 16px rgba(14,165,233,.3)}
.cta-green{background:linear-gradient(135deg,#059669,#10b981);box-shadow:0 4px 16px rgba(5,150,105,.3)}

/* FLOAT CART */
.float-cart{position:fixed;bottom:calc(var(--nav) + 10px);left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:calc(var(--max) - 32px);background:var(--sky);border-radius:14px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;color:#fff;cursor:pointer;box-shadow:0 8px 24px rgba(14,165,233,.35);z-index:50}
.float-cart-count{background:rgba(255,255,255,.25);border-radius:8px;padding:2px 8px;font-size:.82rem;font-weight:700}
.float-cart-total{font-size:1rem;font-weight:800}

/* ORDER SUCCESS */
.success{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px;text-align:center;background:linear-gradient(135deg,#ecfdf5,#f0f9ff)}
.success-ico{font-size:5rem;margin-bottom:16px}
.success-t{font-size:1.5rem;font-weight:900;color:var(--green)}
.success-s{font-size:.88rem;color:var(--t2);margin-top:6px}

/* PROFILE */
.prof-card{background:linear-gradient(135deg,#1e293b,#334155);border-radius:20px;padding:24px;color:#fff;margin:16px;text-align:center}
.prof-avatar{width:66px;height:66px;border-radius:50%;background:linear-gradient(135deg,#0ea5e9,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin:0 auto 10px;box-shadow:0 4px 16px rgba(14,165,233,.4)}
.prof-name{font-size:1.2rem;font-weight:900}
.prof-level{display:inline-flex;align-items:center;gap:4px;padding:3px 12px;border-radius:20px;font-size:.6rem;font-weight:700;margin-top:6px}
.prof-stats{display:flex;gap:8px;margin-top:16px}
.prof-stat{flex:1;background:rgba(255,255,255,.08);border-radius:12px;padding:10px}
.prof-stat-val{font-size:1rem;font-weight:900}
.prof-stat-lbl{font-size:.52rem;opacity:.5;margin-top:2px}

.prof-pts{background:var(--card);border-radius:var(--r);padding:16px;margin:0 16px 10px;border:1px solid var(--border)}
.pts-bar-bg{background:#f3f4f6;border-radius:4px;height:8px;overflow:hidden;margin-top:8px}
.pts-bar{height:100%;background:linear-gradient(90deg,#f59e0b,#eab308);border-radius:4px}

.refer{margin:0 16px 10px;background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:var(--r);padding:16px;border:1px solid #fcd34d}
.refer-code{margin-top:10px;background:#fff;border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.refer-code-txt{font-family:'IBM Plex Mono',monospace;font-size:1rem;font-weight:700;color:#92400e;letter-spacing:2px}
.refer-copy{padding:6px 14px;border-radius:8px;background:#f59e0b;color:#fff;border:none;font-size:.68rem;font-weight:700;cursor:pointer;font-family:inherit}

.menu-item{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--card);border-bottom:1px solid var(--border);cursor:pointer}
.menu-ico{font-size:1.1rem;width:28px;text-align:center}
.menu-lbl{font-size:.88rem;font-weight:600;flex:1}
.menu-arr{color:var(--t4);font-size:.82rem}
.notif-badge{background:var(--red);color:#fff;font-size:.52rem;padding:1px 5px;border-radius:8px;font-weight:700}

/* ORDER ITEM */
.order{background:var(--card);border-radius:var(--r);padding:14px 16px;margin:0 16px 8px;border:1px solid var(--border)}
.order-top{display:flex;justify-content:space-between;margin-bottom:8px}
.order-id{font-family:monospace;font-size:.78rem;font-weight:700;color:var(--t2)}
.order-status{font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:6px}
.order-company{font-size:.88rem;font-weight:700}
.order-meta{font-size:.72rem;color:var(--t3);margin-top:2px}
.order-progress{margin-top:10px;background:#f3f4f6;border-radius:6px;height:6px;overflow:hidden}
.order-bar{height:100%;background:linear-gradient(90deg,#0ea5e9,#3b82f6);border-radius:6px}

.empty{text-align:center;padding:50px 20px;color:var(--t3)}
.empty-ico{font-size:3.5rem;margin-bottom:10px;opacity:.4}
.empty-txt{font-size:.95rem;font-weight:600}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card,.prod,.order,.area,.info-card{animation:fadeUp .25s ease both}

/* ═══ LOGIN ═══ */
.login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 24px;background:linear-gradient(165deg,#0c4a6e 0%,#0369a1 30%,#0ea5e9 60%,#38bdf8 100%);position:relative;overflow:hidden}
.login::before{content:'';position:absolute;top:-100px;right:-100px;width:350px;height:350px;border-radius:50%;background:rgba(255,255,255,.04);pointer-events:none}
.login::after{content:'';position:absolute;bottom:-80px;left:-80px;width:280px;height:280px;border-radius:50%;background:rgba(255,255,255,.03);pointer-events:none}
.login *{position:relative}
.login-logo{margin-bottom:8px}
.login-name{font-size:2.4rem;font-weight:900;color:#fff;letter-spacing:-1px;margin-bottom:2px}
.login-name-ar{font-size:1.8rem;font-weight:800;color:rgba(255,255,255,.7);margin-bottom:4px;font-family:'Tajawal',sans-serif}
.login-tag{font-size:.78rem;color:rgba(255,255,255,.55);margin-bottom:32px;text-align:center}
.login-card{width:100%;background:rgba(255,255,255,.1);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:24px;padding:28px 22px;border:1px solid rgba(255,255,255,.15);box-shadow:0 20px 60px rgba(0,0,0,.15)}
.login-title{font-size:1.1rem;font-weight:800;color:#fff;margin-bottom:18px;text-align:center}
.login-field{margin-bottom:14px}
.login-label{font-size:.7rem;color:rgba(255,255,255,.6);margin-bottom:5px;display:block;font-weight:600}
.login-input{width:100%;padding:13px 16px;border-radius:12px;border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;font-size:.88rem;outline:none;font-family:inherit;transition:border-color .2s}
.login-input::placeholder{color:rgba(255,255,255,.3)}
.login-input:focus{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.12)}
.login-btn{width:100%;padding:15px;border-radius:14px;border:none;background:#fff;color:#0284c7;font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;margin-top:6px;box-shadow:0 4px 16px rgba(0,0,0,.1);transition:transform .1s}
.login-btn:active{transform:scale(.97)}
.login-error{color:#fca5a5;font-size:.72rem;text-align:center;margin-top:10px;min-height:18px}
.login-demo{margin-top:16px;text-align:center}
.login-demo-title{font-size:.65rem;color:rgba(255,255,255,.4);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.login-demo-box{background:rgba(255,255,255,.06);border-radius:12px;padding:12px 16px;border:1px dashed rgba(255,255,255,.15)}
.login-demo-row{display:flex;justify-content:space-between;padding:3px 0;font-size:.72rem;color:rgba(255,255,255,.5)}
.login-demo-row b{color:rgba(255,255,255,.8);font-weight:600;direction:ltr}
.login-footer{margin-top:24px;text-align:center;font-size:.58rem;color:rgba(255,255,255,.3)}
.login-footer a{color:rgba(255,255,255,.5);text-decoration:none}
.login-lang{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.12);border:none;border-radius:8px;padding:5px 12px;color:rgba(255,255,255,.7);font-size:.68rem;cursor:pointer;font-family:inherit;font-weight:600;backdrop-filter:blur(4px)}
[dir="ltr"] .login-lang{right:auto;left:16px}
.login-remember{display:flex;align-items:center;gap:8px;margin:10px 0 4px}
.login-remember input{width:16px;height:16px;accent-color:#fff}
.login-remember label{font-size:.72rem;color:rgba(255,255,255,.5);cursor:pointer}
.login-forgot{text-align:center;margin-top:10px}
.login-forgot a{font-size:.72rem;color:rgba(255,255,255,.5);text-decoration:none}
.login-forgot a:hover{color:#fff}
.login-divider{display:flex;align-items:center;gap:10px;margin:18px 0;color:rgba(255,255,255,.3);font-size:.65rem}

if(S.promoOk)sum.innerHTML+='<div class="sum-row sum-disc"><span>'+t('promoApplied')+' (10%)</span><span>-'+disc.toFixed(3)+' '+t('kd')+'</span></div>';
sum.innerHTML+='<div class="sum-row sum-total"><span>'+t('total')+'</span><span>'+final_.toFixed(3)+' '+t('kd')+'</span></div>';
d.appendChild(sum);

// Points
d.appendChild(n('div',{style:{margin:'0 16px 12px',background:'#fef3c7',borderRadius:'12px',padding:'12px',textAlign:'center',fontSize:'.82rem',color:'#92400e'}},'⭐ '+t('earnPts')+' +'+Math.floor(final_*10)+' '+t('points')));

// CTA
var cta=n('div',{className:'cta'});cta.appendChild(n('button',{className:'cta-btn cta-green',onclick:function(){S.orderPlaced=true;render()}},t('placeOrder')+' — '+final_.toFixed(3)+' '+t('kd')));d.appendChild(cta);
return d}

// ═══ SUCCESS ═══
function renderSuccess(){
var d=n('div',{className:'success'});
d.appendChild(n('div',{className:'success-ico'},'✅'));
d.appendChild(n('div',{className:'success-t'},t('orderPlaced')));
d.appendChild(n('div',{className:'success-s'},t('orderTrack')));
var card=n('div',{style:{background:'#fff',borderRadius:'16px',padding:'20px',width:'100%',boxShadow:'0 2px 12px rgba(0,0,0,.06)',marginTop:'20px',textAlign:S.lang==='ar'?'right':'left'}});
card.innerHTML='<div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="color:#9ca3af;font-size:.82rem">Order ID</span><span style="font-weight:700;font-family:monospace">ORD-'+Math.floor(Math.random()*9000+1000)+'</span></div>';
var disc=S.promoOk?cartTotal()*0.1:0;
card.innerHTML+='<div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="color:#9ca3af;font-size:.82rem">'+t('total')+'</span><span style="font-weight:800;color:#059669">'+(cartTotal()-disc).toFixed(3)+' '+t('kd')+'</span></div>';
card.innerHTML+='<div style="display:flex;justify-content:space-between"><span style="color:#9ca3af;font-size:.82rem">'+t('points')+'</span><span style="font-weight:700;color:#f59e0b">+'+Math.floor((cartTotal()-disc)*10)+' ⭐</span></div>';
d.appendChild(card);
d.appendChild(n('button',{style:{marginTop:'20px',padding:'14px 40px',borderRadius:'12px',background:'#059669',color:'#fff',border:'none',fontSize:'.95rem',fontWeight:'700',cursor:'pointer',fontFamily:'inherit'},onclick:function(){S.orderPlaced=false;S.showCheckout=false;S.showCart=false;S.cart=[];S.promoOk=false;S.promo='';S.tab='home';S.page='home';render()}},t('home')));
return d}

// ═══ COMPANIES PAGE ═══
function renderCompaniesPage(){
var pg=n('div',{className:'page on'});pg.appendChild(n('div',{style:{padding:'20px 16px 10px',fontSize:'1.3rem',fontWeight:'900'}},t('allCompanies')));
var grid=n('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',padding:'0 16px'}});
CH.forEach(function(c){
var card=n('div',{style:{background:'#fff',borderRadius:'16px',padding:'16px',boxShadow:'0 2px 8px rgba(0,0,0,.04)',cursor:'pointer',textAlign:'center',border:'1px solid #f1f5f9'},onclick:function(){S.company=c;S.page='company';S.catFilter=null;render()}});
card.innerHTML='<div style="font-size:2.2rem;margin-bottom:6px">'+c.logo+'</div><div style="font-size:.88rem;font-weight:700">'+c.name[S.lang]+'</div><div style="font-size:.65rem;color:#9ca3af;margin-top:2px">⭐ '+c.rating+' · '+c.products.length+' '+t('products')+'</div>';
grid.appendChild(card)});
pg.appendChild(grid);return pg}

// ═══ ORDERS ═══
function renderOrders(){
var pg=n('div',{className:'page on'});pg.appendChild(n('div',{style:{padding:'20px 16px 10px',fontSize:'1.3rem',fontWeight:'900'}},t('orders')));
ORDERS.forEach(function(o){
var el=n('div',{className:'order'});
var top=n('div',{className:'order-top'});top.appendChild(n('span',{className:'order-id'},o.id));
var sc=o.status==='delivered'?'#ecfdf5':'#fefce8';var stc=o.status==='delivered'?'#059669':'#f59e0b';
top.appendChild(n('span',{className:'order-status',style:{background:sc,color:stc}},t(o.status)));
el.appendChild(top);el.appendChild(n('div',{className:'order-company'},o.co));
el.appendChild(n('div',{className:'order-meta'},o.items+' '+t('items')+' · '+o.total.toFixed(3)+' '+t('kd')));
if(o.status!=='delivered'){var pb=n('div',{className:'order-progress'});pb.appendChild(n('div',{className:'order-bar',style:{width:o.progress+'%'}}));el.appendChild(pb)}
pg.appendChild(el)});return pg}

// ═══ PROFILE ═══
function renderProfile(){
var pg=n('div',{className:'page on'});
// Card
var card=n('div',{className:'prof-card'});
card.appendChild(n('div',{className:'prof-avatar'},'👤'));
card.appendChild(n('div',{className:'prof-name'},USER.name[S.lang]));
card.appendChild(n('div',{className:'prof-level',style:{background:'rgba(148,163,184,.2)',border:'1px solid rgba(148,163,184,.4)',color:'#94a3b8'}},'👑 '+t('silverMember')));
var stats=n('div',{className:'prof-stats'});
[['⭐ '+USER.pts.toLocaleString(),t('points')],['📦 '+USER.orders,t('orders_count')],['💰 '+USER.saved.toFixed(1),t('saved')]].forEach(function(s){
var st=n('div',{className:'prof-stat'});st.appendChild(n('div',{className:'prof-stat-val'},s[0]));st.appendChild(n('div',{className:'prof-stat-lbl'},s[1]));stats.appendChild(st)});
card.appendChild(stats);pg.appendChild(card);

// Points bar
var pts=n('div',{className:'prof-pts'});
pts.innerHTML='<div style="display:flex;justify-content:space-between"><span style="font-size:.82rem;font-weight:700">'+t('points')+'</span><span style="font-size:.72rem;color:#f59e0b;font-weight:700">⭐ '+USER.pts+' / 5,000</span></div>';
pts.innerHTML+='<div class="pts-bar-bg"><div class="pts-bar" style="width:'+(USER.pts/5000*100)+'%"></div></div>';
pg.appendChild(pts);

// Referral
var ref=n('div',{className:'refer'});
ref.innerHTML='<div style="display:flex;align-items:center;gap:10px"><span style="font-size:1.6rem">🎁</span><div><div style="font-size:.88rem;font-weight:700;color:#92400e">'+t('inviteFriends')+'</div><div style="font-size:.68rem;color:#a16207;margin-top:2px">'+t('earnRefer')+'</div></div></div>';
ref.innerHTML+='<div class="refer-code"><span class="refer-code-txt">ALI2026</span><button class="refer-copy" onclick="navigator.clipboard&&navigator.clipboard.writeText(\'ALI2026\')">'+t('copyCode')+'</button></div>';
pg.appendChild(ref);

// Menu
[['📝',t('editProfile')],['📍',t('myAddresses')],['🔔',t('notifications'),'2'],['❓',t('helpCenter')],['🌐',t('langSwitch'),null,function(){S.lang=S.lang==='ar'?'en':'ar';render()}],['🚪',t('logout'),null,function(){S.loggedIn=false;S.cart=[];S.tab='home';render()}]].forEach(function(m){
var mi=n('div',{className:'menu-item',onclick:m[3]||null});mi.appendChild(n('span',{className:'menu-ico'},m[0]));mi.appendChild(n('span',{className:'menu-lbl'},m[1]));
if(m[2])mi.appendChild(n('span',{className:'notif-badge'},m[2]));
else if(m[3]||!m[3])mi.appendChild(n('span',{className:'menu-arr'},'←'));
pg.appendChild(mi)});

pg.appendChild(n('div',{style:{textAlign:'center',padding:'16px',fontSize:'.62rem',color:'#9ca3af'}},'MAI v1.0 — Ali AlEnezi · @SiteQ8'));
return pg}

// ═══ FLOAT CART ═══
function renderFloatCart(root){
if(cartCount()===0||S.tab==='profile')return;
var fc=n('div',{className:'float-cart',onclick:function(){S.showCart=true;render()}});
fc.appendChild(n('span',{className:'float-cart-count'},'🛒 '+cartCount()+' '+t('items')));
fc.appendChild(n('span',{className:'float-cart-total'},cartTotal().toFixed(3)+' '+t('kd')));
root.appendChild(fc)}

// ═══ NAV ═══
function renderNav(root){
var nav=n('div',{className:'bnav'});
[['home','🏠',t('home')],['companies','🏢',t('companies')],['orders','📦',t('orders')],['profile','👤',t('profile')]].forEach(function(tab){
var ni=n('div',{className:'bnav-i'+(S.tab===tab[0]?' on':''),onclick:function(){S.tab=tab[0];S.page='home';S.company=null;render()}});
ni.appendChild(n('div',{className:'ico'},tab[1]));ni.appendChild(n('div',{className:'lbl'},tab[2]));nav.appendChild(ni)});
root.appendChild(nav)}

// ═══ INIT ═══
render();

</script>
</body>
</html>
